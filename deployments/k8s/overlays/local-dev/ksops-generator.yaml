  - ../dev-shared/fleet-secret.sops.yaml
  - ../dev-shared/telemetry-secret.sops.yaml
  - ../dev-shared/postgres-secret.sops.yaml
  - ../dev-shared/redis-secret.sops.yaml
  - ../dev-shared/qdrant-secret.sops.yaml
  - ../dev-shared/keycloak-secret.sops.yaml