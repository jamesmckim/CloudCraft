apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak-operator
  namespace: craftcloud-system
spec:
  project: default
  source:
    repoURL: 'https://github.com/keycloak/keycloak-k8s-resources.git'
    targetRevision: '26.6.4'
    path: 'kubernetes'
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: craftcloud-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true # Highly recommended for large Operator CRDs