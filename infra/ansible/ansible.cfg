[defaults]
# Automatically use your generated inventory file so you don't have to type -i
inventory = inventory.ini

# CRITICAL for testbeds: Disables the "Are you sure you want to continue connecting?" prompt 
# when Ansible connects to a brand new VM for the first time.
host_key_checking = False

# Makes the console output much easier to read (formats it like YAML)
stdout_callback = yaml

# Optional: Gives you a nice timing report at the end of the playbook
callbacks_enabled = timer, profile_tasks

[ssh_connection]
# Massively speeds up execution by reducing the number of SSH operations
pipelining = True

# Optimizes connection multiplexing (keeps the SSH tunnel open for subsequent tasks)
# This is especially helpful when routing through the FABRIC Bastion host.
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
control_path = %(directory)s/ansible-ssh-%%h-%%p-%%r