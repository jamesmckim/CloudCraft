apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudcraft-infrastructure
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/jamesmckim/CloudCraft.git'
    targetRevision: main
    path: infra/applications
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true