fullnameOverride: "postgres"

primary:
  persistence:
    size: 5Gi
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
    
  extraEnvVars:
    - name: SYNCER_DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: postgres-secrets
          key: SYNCER_DB_PASSWORD
    - name: POSTGRES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: postgres-secrets
          key: DB_PASS

  initdb:
    scripts:
      init-dbs.sh: |
        #!/bin/bash
        set -e
        
        export PGPASSWORD=$POSTGRES_PASSWORD

        # 1. Create the database and user
        psql -U postgres -d postgres <<-EOSQL
            CREATE DATABASE thunderstore;
            CREATE DATABASE keycloak;
            CREATE USER syncer_user WITH PASSWORD '${SYNCER_DB_PASSWORD}';
        EOSQL
        
        # 2. Grant privileges for 'thunderstore'
        psql -v ON_ERROR_STOP=1 --username postgres --dbname thunderstore <<-EOSQL
            GRANT ALL PRIVILEGES ON DATABASE thunderstore TO syncer_user;
            ALTER SCHEMA public OWNER TO syncer_user;
            GRANT ALL ON SCHEMA public TO syncer_user;
        EOSQL
        
        # 3. Grant privileges for 'keycloak'
        psql -v ON_ERROR_STOP=1 --username postgres --dbname keycloak <<-EOSQL
            GRANT ALL PRIVILEGES ON DATABASE keycloak TO "user";
            ALTER SCHEMA public OWNER TO "user";
            GRANT ALL ON SCHEMA public TO "user";
        EOSQL
        
        # 4. Your existing craftcloud db permissions
        psql -v ON_ERROR_STOP=1 --username postgres --dbname craftcloud <<-EOSQL
            GRANT SELECT ON ALL TABLES IN SCHEMA public TO "user";
        EOSQL

auth:
  database: "craftcloud"
  username: "user"
  existingSecret: "postgres-secrets"
  secretKeys:
    userPasswordKey: "DB_PASS"
    adminPasswordKey: "DB_PASS"