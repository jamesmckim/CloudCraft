apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudcraft-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/jamesmckim/CloudCraft.git'
    targetRevision: main
    path: k8s/overlays/prod
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true