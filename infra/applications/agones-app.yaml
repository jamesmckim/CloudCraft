apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agones-system
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/jamesmckim/CloudCraft.git'
    targetRevision: main
    path: infra/agones
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: agones-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true