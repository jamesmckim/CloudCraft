---
- name: Ensure apt cache is updated
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600 # Don't update if updated in the last hour

- name: Install base system utilities
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - apt-transport-https
      - jq
      - tar
    state: present

- name: Install Age (Encryption Tool)
  ansible.builtin.unarchive:
    src: "https://github.com/FiloSottile/age/releases/download/{{ age_version }}/age-{{ age_version }}-linux-amd64.tar.gz"
    dest: /usr/local/bin/
    remote_src: yes
    # Extract only the binaries, stripping the parent directory in the tarball
    extra_opts:
      - --strip-components=1
      - age/age
      - age/age-keygen
    creates: /usr/local/bin/age

- name: Install SOPS (Secrets OPerationS)
  ansible.builtin.get_url:
    url: "https://github.com/getsops/sops/releases/download/{{ sops_version }}/sops-{{ sops_version }}.linux.amd64"
    dest: /usr/local/bin/sops
    mode: '0755'

- name: Install Skaffold
  ansible.builtin.get_url:
    url: "https://storage.googleapis.com/skaffold/releases/latest/skaffold-linux-amd64"
    dest: /usr/local/bin/skaffold
    mode: '0755'

- name: Install Helm
  ansible.builtin.unarchive:
    src: "https://get.helm.sh/helm-{{ helm_version }}-linux-amd64.tar.gz"
    dest: /usr/local/bin/
    remote_src: yes
    extra_opts:
      - --strip-components=1
      - linux-amd64/helm
    creates: /usr/local/bin/helm

- name: Identify Management Interface for DHCP (Ignore internal LAN)
  ansible.builtin.set_fact:
    mgmt_iface: "{{ item }}"
  loop: "{{ ansible_interfaces }}"
  when: 
    - item != 'lo'
    - vars['ansible_' + item | replace('-', '_')].ipv4 is defined
    - vars['ansible_' + item | replace('-', '_')].ipv4.address != internal_ip
    - not vars['ansible_' + item | replace('-', '_')].ipv4.address.startswith('10.42')

- name: Ensure iptables-persistent is installed
  ansible.builtin.apt:
    name: iptables-persistent
    state: present
  become: yes

- name: Check if IPv4 MSS Clamping is already applied
  ansible.builtin.command: iptables -t mangle -C POSTROUTING -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --set-mss 1360
  register: iptables_check_ipv4
  failed_when: false
  changed_when: false
  become: yes

- name: Clamp MSS to PMTU for IPv4 (FABRIC MTU Fix)
  ansible.builtin.command: iptables -t mangle -A POSTROUTING -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --set-mss 1360
  when: iptables_check_ipv4.rc != 0
  become: yes

- name: Check if IPv6 MSS Clamping is already applied
  ansible.builtin.command: ip6tables -t mangle -C POSTROUTING -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --set-mss 1360
  register: iptables_check_ipv6
  failed_when: false
  changed_when: false
  become: yes

- name: Clamp MSS to PMTU for IPv6 (FABRIC MTU Fix)
  ansible.builtin.command: ip6tables -t mangle -A POSTROUTING -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --set-mss 1360
  when: iptables_check_ipv6.rc != 0
  become: yes

- name: Save iptables rules to persist across reboots
  ansible.builtin.command: netfilter-persistent save
  when: iptables_check_ipv4.rc != 0 or iptables_check_ipv6.rc != 0
  become: yes

- name: Create persistent DHCP service for FABRIC IPv4 routing
  ansible.builtin.copy:
    dest: /etc/systemd/system/fabric-ipv4-route.service
    content: |
      [Unit]
      Description=Force IPv4 DHCP lease on FABRIC management interface
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/sbin/dhclient -4 -v {{ mgmt_iface }}
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target
  become: yes

- name: Enable and start FABRIC IPv4 routing service
  ansible.builtin.systemd:
    name: fabric-ipv4-route
    enabled: yes
    state: restarted
    daemon_reload: yes
  become: yes