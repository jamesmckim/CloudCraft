---
- name: Ensure Python Kubernetes client is installed natively on the Master
  ansible.builtin.apt:
    name: python3-kubernetes
    state: present
    update_cache: yes
    
- name: Ensure ArgoCD namespace exists
  kubernetes.core.k8s:
    name: argocd
    kind: Namespace
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
  register: api_check
  until: api_check is not failed
  retries: 12
  delay: 5

- name: Apply ArgoCD Core Manifests
  kubernetes.core.k8s:
    src: https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
    namespace: argocd
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present

- name: Wait for ArgoCD Server to become Available
  kubernetes.core.k8s_info:
    kind: Deployment
    name: argocd-server
    namespace: argocd
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    wait: yes
    wait_condition:
      type: Available
      status: "True"
    wait_timeout: 300

- name: Wait for ArgoCD Application Controller to become Available
  kubernetes.core.k8s_info:
    kind: Deployment
    name: argocd-application-controller
    namespace: argocd
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    wait: yes
    wait_condition:
      type: Available
      status: "True"
    wait_timeout: 300

- name: Apply GitOps Application Manifest
  kubernetes.core.k8s:
    src: https://raw.githubusercontent.com/jamesmckim/CloudCraft/main/infra/master-infra-app.yaml
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present

- name: Inject Age Private Key into ArgoCD
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: sops-age-key
        namespace: argocd
      type: Opaque
      stringData:
        # Replace this with your actual Ansible Vault variable referencing the key
        keys.txt: "{{ vault_sops_age_private_key }}"

- name: Create SOPS Configuration Management Plugin
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: cmp-sops
        namespace: argocd
      data:
        plugin.yaml: |
          apiVersion: argoproj.io/v1alpha1
          kind: ConfigManagementPlugin
          metadata:
            name: sops
          spec:
            generate:
              command: ["sh", "-c"]
              # Decrypts all SOPS files in the temp directory, then builds Kustomize
              args: ["find . -name '*.sops.yaml' -exec sops -d -i {} \\; && kustomize build ."]

- name: Inject SOPS Sidecar into ArgoCD Repo Server
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: argocd-repo-server
        namespace: argocd
      spec:
        template:
          spec:
            volumes:
              - name: cmp-tmp
                emptyDir: {}
              - name: sops-age-key
                secret:
                  secretName: sops-age-key
            containers:
              - name: sops-plugin
                # A lightweight alpine image with SOPS already installed
                image: mozilla/sops:v3.12.2
                command: [/var/run/argocd/argocd-cmp-server]
                env:
                  - name: SOPS_AGE_KEY_FILE
                    value: /app/sops/keys.txt
                volumeMounts:
                  - name: var-files
                    mountPath: /var/run/argocd
                  - name: plugins
                    mountPath: /home/argocd/cmp-server/plugins
                  - name: cmp-tmp
                    mountPath: /tmp
                  - name: sops-age-key
                    mountPath: /app/sops/keys.txt
                    readOnly: true