name: Docker Publish

on:
  push:
    branches: ["main"]

jobs:
  detect_changes:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.filter.outputs.changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Identify changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            identity-billing-service: 'services/identity-billing-service/**'
            fleet-manager: 'services/fleet-manager/**'
            telemetry-service: 'services/telemetry-service/**'
            webui: 'apps/webui/**'
            mod-syncer: 'workers/mod-syncer/**'
            ai-worker: 'workers/ai-worker/**'
            payment-worker: 'workers/payment-worker/**'
            valheim-sidecar: 'sidecar/**'

  build_and_push:
    needs: detect_changes
    if: ${{ needs.detect_changes.outputs.modules != '[]' && needs.detect_changes.outputs.modules != '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.detect_changes.outputs.modules) }}
        
    permissions:
      contents: read
      packages: write

    env:
      DOCKER_REPO: ${{ github.repository_owner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase the username
        run: echo "DOCKER_REPO=${DOCKER_REPO,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Latest Skaffold
        run: |
          curl -Lo skaffold https://storage.googleapis.com/skaffold/releases/latest/skaffold-linux-amd64
          sudo install skaffold /usr/local/bin/

      - name: Build and Push Images with Skaffold
        run: skaffold build -p prod --default-repo ghcr.io/${{ env.DOCKER_REPO }} --push