# config/settings.yaml

kubernetes:
  # The default namespace where your game servers will live
  namespace: "craftcloud-system"

agones:
  # The Custom Resource Definition (CRD) details for Agones
  group: "agones.dev"
  version: "v1"
  plural: "gameservers"

app:
  # The internal URL your sidecar uses to talk back to the manager
  manager_api_url: "http://manager-api:5000"