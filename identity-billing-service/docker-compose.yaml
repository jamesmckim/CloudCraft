services:
  # 1. PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: identity_db
    restart: always
    environment:
      POSTGRES_USER: identity_admin
      POSTGRES_PASSWORD: supersecurepassword
      POSTGRES_DB: identity_billing_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U identity_admin -d identity_billing_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Identity & Billing API
  api:
    build:
      context: .
      target: dev # Uses the dev stage from your Dockerfile
    container_name: identity_api
    ports:
      - "8000:8000"
    environment:
      # Matches the credentials set in the 'db' service above
      DATABASE_URL: postgresql://identity_admin:supersecurepassword@db:5432/identity_billing_db
      SECRET_KEY: local_development_secret_key_change_in_prod
      DOMAIN_URL: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mounts your local code into the container for live-reloading
      - .:/app

  # 3. Database Seeder (Runs once and exits)
  seeder:
    build:
      context: .
      target: dev
    container_name: identity_seeder
    environment:
      DATABASE_URL: postgresql://identity_admin:supersecurepassword@db:5432/identity_billing_db
      SECRET_KEY: local_development_secret_key_change_in_prod
    depends_on:
      db:
        condition: service_healthy
    # Overrides the default uvicorn command to run your seed script instead
    command: python seed_db.py
    restart: "no"

volumes:
  postgres_data: