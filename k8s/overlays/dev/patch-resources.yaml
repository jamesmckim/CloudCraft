apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: craftcloud-system
spec:
  template:
    spec:
      containers:
      - name: identity-service
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
---
