apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# 1. Inherit everything from the base folder
resources:
  - ../../base
  - identity-secret.plain.yaml
  - fleet-secret.plain.yaml
  - telemetry-secret.plain.yaml
  - postgres-secret.plain.yaml

# 2. Automatically apply a label to EVERYTHING in this environment
labels:
  - pairs:
      environment: dev
