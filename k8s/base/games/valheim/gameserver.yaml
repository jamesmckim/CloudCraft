apiVersion: agones.dev/v1
kind: GameServer
metadata:
  name: valheim-server-standalone
  labels:
    app: valheim-server
    craftcloud.role: game_server
spec:
  # Agones replaces your Service! It manages port allocation natively.
  ports:
    - name: game-port
      portPolicy: Dynamic
      containerPort: 2456
      protocol: UDP
    - name: query-port
      portPolicy: Dynamic
      containerPort: 2457
      protocol: UDP
  template:
    spec:
      containers:
        # 1. The Main Game Server
        - name: valheim
          image: lloesche/valheim-server:latest
          env:
            - name: SERVER_NAME
              value: "CraftCloud K8s Agones"
            - name: SERVER_PUBLIC
              value: "1"
          volumeMounts:
            - name: world-data
              mountPath: /config
            - name: game-binaries
              mountPath: /opt/valheim
              
        # 2. Your Custom Python Sidecar
        - name: activity-sidecar
          image: python:3.14.1-alpine3.23
          command: ["python", "-u", "/app/main.py"]
          env:
            - name: TARGET_CONTAINER_NAME
              value: "valheim-server-standalone" 
            - name: MANAGER_API_URL
              value: "http://manager-api:5000"
            - name: LOG_FILE_PATH
              value: "/config/Bepinex/LogOutput.log"
            - name: TICK_RATE
              value: "30"
            - name: IDLE_THRESHOLD
              value: "900"
            - name: GAME_TYPE
              value: "valheim"
          volumeMounts:
            - name: world-data
              mountPath: /config
              readOnly: true
            - name: sidecar-scripts-volume # Mounts the Kustomize ConfigMap
              mountPath: /app
              
      volumes:
        - name: world-data
          persistentVolumeClaim:
            claimName: valheim-world-pvc
        - name: game-binaries
          persistentVolumeClaim:
            claimName: valheim-binaries-pvc
        # This injects your main.py and probes.py without needing a Dockerfile
        - name: sidecar-scripts-volume
          configMap:
            name: sidecar-scripts