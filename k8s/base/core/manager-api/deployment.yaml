apiVersion: apps/v1
kind: Deployment
metadata:
  name: manager-api
  labels:
    app: manager-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: manager-api
  template:
    metadata:
      labels:
        app: manager-api
    spec:
      serviceAccountName: manager-api-sa
      containers:
        - name: api
          image: manager-api-image
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: craftcloud-config
            - secretRef:
                name: craftcloud-secrets
      initContainers:
        - name: wait-for-db
          image: postgres:18-alpine
          command:
            - sh
            - -c
            - |
              echo "Waiting for database..."
              # Note: We use 'user' here because this is the master API account
              until pg_isready -h postgres-service -U user; do
                sleep 2
              done
              echo "Database is ready!"