apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry-service
  namespace: craftcloud-system
  labels:
    app: telemetry-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telemetry-service
  template:
    metadata:
      labels:
        app: telemetry-service
    spec:
      containers:
        - name: telemetry-service
          image: telemetry-api-image
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: ENVIRONMENT
              value: "development"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: telemetry-secrets
                  key: DATABASE_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: telemetry-secrets
                  key: SECRET_KEY
            - name: SIDECAR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: telemetry-secrets
                  key: SIDECAR_API_KEY
      initContainers:
        - name: wait-for-db
          image: postgres:18-alpine
          env:
            - name: PGHOST
              value: "postgres-service"
            - name: PGUSER
              value: "user"
          command:
            - sh
            - -c
            - |
              echo "Waiting for database..."
              until pg_isready; do
                sleep 2
              done
              echo "Database is ready!"
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - 'sh'
            - '-c'
            - >
              echo "Waiting for redis-broker:6379...";
              until nc -z redis-broker 6379; do
                sleep 2;
              done;
              echo "Redis is ready!";