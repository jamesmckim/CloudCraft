apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry-service
  labels:
    app: telemetry-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telemetry-service
  template:
    metadata:
      labels:
        app: telemetry-service
    spec:
      containers:
        - name: telemetry-service
          image: telemetry-api-image
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: ENVIRONMENT
              value: "development"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: telemetry-secrets
                  key: DATABASE_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: telemetry-secrets
                  key: SECRET_KEY
            - name: SIDECAR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: telemetry-secrets
                  key: SIDECAR_API_KEY