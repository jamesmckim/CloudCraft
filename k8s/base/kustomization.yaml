apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Set a common namespace for all base resources
namespace: craftcloud-system

# 1. Bring in all the sub-components
resources:
  - namespace.yaml
  - config/
  - data/postgres/
  - data/redis/
  - data/qdrant/
  - core/ingress.yaml
  - core/manager-api/
  - core/dashboard/
  - core/mod-syncer/
  - core/ai-rag-worker/
  - games/valheim/