apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Set a common namespace for all base resources
namespace: craftcloud-system

# 1. Bring in all the sub-components
resources:
  - namespace.yaml
  - core/agones-sdk/rbac-sdk.yaml
  - config/
  - data/postgres/
  - data/redis/
  - data/qdrant/
#  - core/ingress.yaml
#  - core/manager-api/
  - core/dashboard/
  - core/mod-syncer/
  - core/ai-rag-worker/
  - core/api/

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: sidecar-scripts
    files:
      - main.py=core/sidecar-scripts/main.py
      - probes.py=core/sidecar-scripts/probes.py
    