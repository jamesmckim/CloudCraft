apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: craftcloud-system
  labels:
    app: identity-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      containers:
        - name: identity-service
          image: identity-api-image
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secrets
                  key: REDIS_PASSWORD
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: identity-secrets
                  key: STRIPE_SECRET_KEY
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: identity-secrets
                  key: STRIPE_WEBHOOK_SECRET
            - name: PAYPAL_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: identity-secrets
                  key: PAYPAL_CLIENT_ID
            - name: PAYPAL_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: identity-secrets
                  key: PAYPAL_CLIENT_SECRET
            - name: PAYPAL_WEBHOOK_ID
              valueFrom:
                secretKeyRef:
                  name: identity-secrets
                  key: PAYPAL_WEBHOOK_ID
            - name: ENVIRONMENT
              value: "development"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: identity-secrets
                  key: DATABASE_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: identity-secrets
                  key: SECRET_KEY
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: identity-secrets
                  key: INTERNAL_API_KEY
      initContainers:
        - name: wait-for-db
          image: postgres:18-alpine
          env:
            - name: PGHOST
              value: "postgres"
            - name: PGUSER
              value: "user"
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: DB_PASS
          command:
            - sh
            - -c
            - |
              echo "Waiting for database..."
              until pg_isready; do
                sleep 2
              done
              echo "Database is ready!"
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - 'sh'
            - '-c'
            - >
              echo "Waiting for redis-broker-master:6379...";
              until nc -z redis-broker-master 6379; do
                sleep 2;
              done;
              echo "Redis is ready!";