apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleet-service
  namespace: craftcloud-system
  labels:
    app: fleet-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fleet-service
  template:
    metadata:
      labels:
        app: fleet-service
    spec:
      serviceAccountName: fleet-service-sa
      containers:
        - name: fleet-service
          image: fleet-api-image
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: ENVIRONMENT
              value: "development"
            - name: IDENTITY_SERVICE_URL
              value: "http://identity-service:5000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: fleet-secrets
                  key: DATABASE_URL
      initContainers:
        - name: wait-for-db
          image: postgres:18-alpine
          env:
            - name: PGHOST
              value: "postgres"
            - name: PGUSER
              value: "user"
          command:
            - sh
            - -c
            - |
              echo "Waiting for database..."
              until pg_isready; do
                sleep 2
              done
              echo "Database is ready!"